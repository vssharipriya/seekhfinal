<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendLens — Previous Works Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --purple-accent: #8b77e8;
      --purple-dim: rgba(139, 119, 232, 0.15);
      --glass-bg: rgba(22, 19, 32, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --card-bg: rgba(30, 27, 43, 0.45);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.55);
      --sidebar-w: 260px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0e0c16;
      color: var(--text-main);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Ambient Background Glows */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 500px;
      height: 500px;
      background: rgba(139, 119, 232, 0.2);
      top: -100px;
      right: -100px;
    }
    .blob-2 {
      width: 400px;
      height: 400px;
      background: rgba(184, 169, 245, 0.1);
      bottom: -100px;
      left: -50px;
    }

    /* Application Framework Layout */
    .app-container {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* Left Sidebar Navigation Component */
    .sidebar {
      width: var(--sidebar-w);
      background: rgba(15, 13, 22, 0.85);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--glass-border);
      padding: 40px 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 32px;
      flex-shrink: 0;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #b8a9f5 0%, #8b77e8 100%);
      display: grid;
      place-items: center;
      font-weight: bold;
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
    }

    .sidebar-menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 500;
      transition: all 0.25s ease;
      cursor: pointer;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      font-size: 14px;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--purple-dim);
      color: #b8a9f5;
    }

    /* Main Workspace Interface Panel */
    .main-workspace {
      flex: 1;
      padding: 48px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .dash-header {
      margin-bottom: 36px;
    }
    .dash-title {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .dash-title em {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: #b8a9f5;
    }
    .dash-subtitle {
      color: var(--text-muted);
      font-size: 15px;
    }

    /* Toolbar Filter Blocks */
    .toolbar-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .search-box input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      padding: 14px 20px;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    .search-box input:focus {
      outline: none;
      border-color: var(--purple-accent);
      box-shadow: 0 0 12px rgba(139, 119, 232, 0.25);
    }

    .controls-row {
      display: flex;
      gap: 20px;
    }
    .filter-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 700;
    }
    .filter-group select {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      padding: 12px 16px;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
    }

    /* Cards Grid System */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .work-card {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .work-card:hover {
      transform: translateY(-4px);
      border-color: rgba(139, 119, 232, 0.4);
    }

    .card-badge {
      display: inline-block;
      align-self: flex-start;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: var(--purple-dim);
      color: #b8a9f5;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
    }
    .card-date {
      font-size: 12px;
      color: var(--text-muted);
    }
    .card-excerpt {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-actions {
      margin-top: auto;
      display: flex;
      gap: 12px;
    }
    .btn-card {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      border: 1px solid var(--glass-border);
    }
    .btn-card-primary {
      background: var(--purple-accent);
      color: #fff;
      border: none;
    }
    .btn-card-primary:hover {
      background: #7a66d4;
    }
    .btn-card-secondary {
      background: transparent;
      color: var(--text-main);
    }
    .btn-card-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Modal System Layouts */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(6, 4, 9, 0.8);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 20px;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-window {
      background: #14121f;
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      width: 100%;
      max-width: 650px;
      display: flex;
      flex-direction: column;
      max-height: 90vh;
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }
    .modal-overlay.active .modal-window {
      transform: scale(1);
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .modal-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: var(--purple-dim);
      color: #b8a9f5;
      margin-bottom: 12px;
    }
    .modal-headline {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .modal-meta {
      font-size: 12px;
      color: var(--text-muted);
    }
    .btn-close-modal {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
    }
    
    .field-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .modal-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .modal-input {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      padding: 12px;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
    }
    .modal-textarea {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      padding: 12px;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      resize: vertical;
    }

    .modal-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .footer-left-actions, .footer-right-actions {
      display: flex;
      gap: 12px;
    }

    .btn-modal {
      padding: 10px 18px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-modal-danger { background: #ea580c; color: #fff; }
    .btn-modal-secondary { background: rgba(255, 255, 255, 0.08); color: #fff; }
    .btn-modal-primary { background: var(--purple-accent); color: #fff; }
    .btn-modal-success { background: #16a34a; color: #fff; }

    /* Structural Utility Classes */
    .hidden-state { display: none !important; }
    .hidden-element { display: none !important; }
    
    .empty-state-wrapper {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; margin-bottom: 6px; }
    .empty-desc { color: var(--text-muted); font-size: 14px; }

    /* Mobile Responsive Framework Breakpoints */
    @media (max-width: 992px) {
      .app-container { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        padding: 24px;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .sidebar-menu { flex-direction: row; gap: 12px; }
      .main-workspace { padding: 24px; }
    }

    @media (max-width: 576px) {
      .sidebar { flex-direction: column; gap: 20px; items-content: center; }
      .controls-row { flex-direction: column; }
      .modal-footer { flex-direction: column; }
      .footer-left-actions .btn-modal, .footer-right-actions .btn-modal { flex: 1; width: 100%; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="app-container">
    
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">✦</div>
        <div class="logo-text">TrendLens</div>
      </div>
      <nav class="sidebar-menu">
        <button class="nav-item active">📁 Archived Works</button>
        <button class="nav-item" onclick="window.location.href='profile.html'">👤 Back to Profile</button>
      </nav>
    </aside>

    <main class="main-workspace">
      <header class="dash-header">
        <h1 class="dash-title">Archived <em>Works</em></h1>
        <p class="dash-subtitle">Manage and export your AI-generated campaigns, copy scripts, and trend reports.</p>
      </header>

      <section class="toolbar-card">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search by title or content keywords...">
        </div>
        <div class="controls-row">
          <div class="filter-group">
            <label for="categoryFilter">Category</label>
            <select id="categoryFilter">
              <option value="all">All Categories</option>
              <option value="Campaign">Campaigns</option>
              <option value="Trend Report">Trend Reports</option>
              <option value="Marketing Post">Marketing Posts</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="sortOrder">Sort By</label>
            <select id="sortOrder">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
            </select>
          </div>
        </div>
      </section>

      <div id="worksGrid" class="works-grid"></div>

      <div id="emptyState" class="empty-state-wrapper hidden-state">
        <div class="empty-icon">📁</div>
        <h3 class="empty-title">No previous works found.</h3>
        <p class="empty-desc">Create your first project inside the workspace to see it archived here.</p>
      </div>
    </main>
  </div>

  <div id="workModal" class="modal-overlay">
    <div class="modal-window">
      <div class="modal-header">
        <div>
          <span id="modalCategory" class="modal-badge">Category</span>
          <h2 id="modalTitle" class="modal-headline">Project Details</h2>
          <p id="modalDate" class="modal-meta">Created on: --</p>
        </div>
        <button class="btn-close-modal" id="closeModalBtn">&times;</button>
      </div>
      <div class="modal-body">
        <div id="modalContentView"></div>
        
        <div id="modalContentEdit" class="hidden-element">
          <div class="field-item">
            <label class="modal-label">Title</label>
            <input type="text" id="editTitleInput" class="modal-input">
          </div>
          <div class="field-item">
            <label class="modal-label">Content Layout Body</label>
            <textarea id="editContentTextarea" class="modal-textarea" rows="8"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <div class="footer-left-actions">
          <button id="modalDeleteBtn" class="btn-modal btn-modal-danger">Delete Work</button>
        </div>
        <div class="footer-right-actions">
          <button id="modalDownloadBtn" class="btn-modal btn-modal-secondary">Download Text</button>
          <button id="modalEditToggleBtn" class="btn-modal btn-modal-primary">Edit Project</button>
          <button id="modalSaveBtn" class="btn-modal btn-modal-success hidden-element">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // System Core Storage State Architecture Check & Injection Fallback
    let archivedProjects =
  JSON.parse(localStorage.getItem('archivedWorks')) || [];

    let activeProjectIdx = null;

    // DOM Target Handles
    const worksGrid = document.getElementById('worksGrid');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const sortOrder = document.getElementById('sortOrder');

    const workModal = document.getElementById('workModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const modalCategory = document.getElementById('modalCategory');
    const modalTitle = document.getElementById('modalTitle');
    const modalDate = document.getElementById('modalDate');
    const modalContentView = document.getElementById('modalContentView');
    const modalContentEdit = document.getElementById('modalContentEdit');
    
    const editTitleInput = document.getElementById('editTitleInput');
    const editContentTextarea = document.getElementById('editContentTextarea');

    const modalEditToggleBtn = document.getElementById('modalEditToggleBtn');
    const modalSaveBtn = document.getElementById('modalSaveBtn');
    const modalDeleteBtn = document.getElementById('modalDeleteBtn');
    const modalDownloadBtn = document.getElementById('modalDownloadBtn');

    // UI View Engine Core Operations
    function renderWorkspaceGrid() {
      const query = searchInput.value.toLowerCase();
      const cat = categoryFilter.value;
      const order = sortOrder.value;

      let filtered = archivedProjects.filter(p => {
        const matchesSearch = p.title.toLowerCase().includes(query) || p.content.toLowerCase().includes(query);
        const matchesCat = (cat === 'all' || p.category === cat);
        return matchesSearch && matchesCat;
      });

      filtered.sort((a, b) => {
        return order === 'newest' ? new Date(b.date) - new Date(a.date) : new Date(a.date) - new Date(b.date);
      });

      if (filtered.length === 0) {
        worksGrid.innerHTML = '';
        emptyState.classList.remove('hidden-state');
        return;
      }

      emptyState.classList.add('hidden-state');
      
      worksGrid.innerHTML = filtered.map((p) => {
        // Handle multiline formatting conversions dynamically
        const formattedExcerpt = p.content.replace(/\n/g, "<br>");
        return `
          <div class="work-card">
            <span class="card-badge">${escapeHTML(p.category)}</span>
            <div>
              <h3 class="card-title">${escapeHTML(p.title)}</h3>
              <span class="card-date">${p.date}</span>
            </div>
            <p class="card-excerpt">${formattedExcerpt}</p>
            <div class="card-actions">
              <button class="btn-card btn-card-primary" onclick="openProjectModal('${p.id}')">View</button>
              <button class="btn-card btn-card-secondary" onclick="openProjectEditModal('${p.id}')">Edit</button>
            </div>
          </div>
        `;
      }).join('');
    }

    window.openProjectModal = function(id) {
      activeProjectIdx = archivedProjects.findIndex(p => p.id === id);
      const project = archivedProjects[activeProjectIdx];
      
      modalCategory.textContent = project.category;
      modalTitle.textContent = project.title;
      modalDate.textContent = `Created on: ${project.date}`;
      modalContentView.innerHTML = project.content.replace(/\n/g, "<br>");
      
      // Hide edit fields automatically
      modalContentView.classList.remove('hidden-element');
      modalContentEdit.classList.add('hidden-element');
      modalSaveBtn.classList.add('hidden-element');
      modalEditToggleBtn.classList.remove('hidden-element');

      workModal.classList.add('active');
    };

    window.openProjectEditModal = function(id) {
      openProjectModal(id);
      toggleEditStateView();
    };

    function toggleEditStateView() {
      const project = archivedProjects[activeProjectIdx];
      editTitleInput.value = project.title;
      editContentTextarea.value = project.content;

      modalContentView.classList.add('hidden-element');
      modalContentEdit.classList.remove('hidden-element');
      modalEditToggleBtn.classList.add('hidden-element');
      modalSaveBtn.classList.remove('hidden-element');
    }

    modalEditToggleBtn.addEventListener('click', toggleEditStateView);

    modalSaveBtn.addEventListener('click', () => {
      if(activeProjectIdx !== null) {
        archivedProjects[activeProjectIdx].title = editTitleInput.value.trim();
        archivedProjects[activeProjectIdx].content = editContentTextarea.value;
        
        localStorage.setItem('archivedWorks', JSON.stringify(archivedProjects));
        renderWorkspaceGrid();
        closeActiveModal();
      }
    });

    modalDeleteBtn.addEventListener('click', () => {
      if(activeProjectIdx !== null && confirm("Are you sure you want to delete this project?")) {
        archivedProjects.splice(activeProjectIdx, 1);
        localStorage.setItem('archivedWorks', JSON.stringify(archivedProjects));
        renderWorkspaceGrid();
        closeActiveModal();
      }
    });

    modalDownloadBtn.addEventListener('click', () => {
      if(activeProjectIdx !== null) {
        const project = archivedProjects[activeProjectIdx];
        const dataStr = `data:text/plain;charset=utf-8,` + encodeURIComponent(`PROJECT: ${project.title}\nCATEGORY: ${project.category}\nDATE: ${project.date}\n\n${project.content}`);
        const dlAnchor = document.createElement('a');
        dlAnchor.setAttribute("href", dataStr);
        dlAnchor.setAttribute("download", `${project.title.toLowerCase().replace(/\s+/g, '_')}_export.txt`);
        document.body.appendChild(dlAnchor);
        dlAnchor.click();
        dlAnchor.remove();
      }
    });

    function closeActiveModal() {
      workModal.classList.remove('active');
      activeProjectIdx = null;
    }

    closeModalBtn.addEventListener('click', closeActiveModal);
    workModal.addEventListener('click', (e) => { if(e.target === workModal) closeActiveModal(); });

    // Live Evaluation Event Binding Handles
    searchInput.addEventListener('input', renderWorkspaceGrid);
    categoryFilter.addEventListener('change', renderWorkspaceGrid);
    sortOrder.addEventListener('change', renderWorkspaceGrid);

    function escapeHTML(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Initial Start Invocation
    renderWorkspaceGrid();
  </script>
</body>
</html>
