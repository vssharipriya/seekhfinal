<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrendLens — Gateway</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Sora:wght=400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lavender:       #b8a9f5;
      --lavender-dim:   rgba(184,169,245,0.18);
      --lavender-pill:  rgba(184,169,245,0.82);
      --gold:           #e8c97a;
      --white:          #ffffff;
      --muted:          rgba(255,255,255,0.45);
      --glass-bg:       rgba(26,24,21,0.45);
      --glass-border:   rgba(255,255,255,0.10);
      --input-bg:       rgba(255,255,255,0.07);
      --input-border:   rgba(255,255,255,0.13);
      --input-focus:    rgba(184,169,245,0.55);
      --placeholder:    rgba(255,255,255,0.35);
      --btn-gradient:   linear-gradient(135deg,#b8a9f5 0%,#8b77e8 100%);
      --font-display:   'Sora', sans-serif;
      --font-body:      'Inter', sans-serif;
      --radius-panel:   14px;
      --radius-input:   10px;
      --radius-btn:     10px;
    }

    html, body {
      height: 100%;
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── FULL-VIEWPORT BACKGROUND ─── */
    body {
      background-image: url('background.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Subtle dark veil over the landscape */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(8,6,18,0.62) 0%,
        rgba(14,10,30,0.48) 50%,
        rgba(6,10,20,0.70) 100%
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ─── TOP NAV BAR ─── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 36px;
    }

    .brand {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--white);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .brand span.lens { color: var(--white); }
    .brand span.trend { color: var(--white); }
    /* Pill tab switcher */
    .tab-bar {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      padding: 4px;
      gap: 0;
    }

    .tab-bar .tab-pill {
      position: absolute;
      top: 4px;
      height: calc(100% - 8px);
      border-radius: 50px;
      background: var(--lavender-pill);
      backdrop-filter: blur(6px);
      transition: left 0.38s cubic-bezier(0.4,0,0.2,1),
                  width 0.38s cubic-bezier(0.4,0,0.2,1);
      z-index: 0;
    }

    .tab-bar button {
      position: relative;
      z-index: 1;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 7px 22px;
      border-radius: 50px;
      color: var(--muted);
      transition: color 0.25s;
      white-space: nowrap;
      user-select: none;
    }
    .tab-bar button.active { color: var(--white); font-weight: 600; }

    /* ─── MAIN CONTENT CENTERING ─── */
    main {
      position: relative;
      z-index: 5;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    /* ─── GLASS PANEL ─── */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(15px) saturate(1.3);
      -webkit-backdrop-filter: blur(15px) saturate(1.3);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-panel);
      width: 100%;
      max-width: 440px; 
      padding: 36px 32px 32px;
      box-shadow:
        0 8px 48px rgba(0,0,0,0.38),
        0 1.5px 0 rgba(255,255,255,0.06) inset;
    }

    /* ─── AVATAR ACCENT ─── */
    .avatar-ring {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: var(--lavender-dim);
      border: 2px solid rgba(184,169,245,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 0 6px rgba(184,169,245,0.09);
    }
    .avatar-ring svg { width: 28px; height: 28px; }

    /* ─── FORM VIEWS (fade transition) ─── */
    .form-view {
      opacity: 0;
      pointer-events: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      transition: opacity 0.32s ease;
    }
    .form-view.active {
      opacity: 1;
      pointer-events: auto;
      position: relative;
    }
    .forms-wrapper { position: relative; }

    /* ─── FIELD LABELS ─── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 7px;
    }

    /* ─── INPUT WRAPPERS ─── */
    .input-wrap {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius-input);
      padding: 0 14px;
      gap: 10px;
      transition: border-color 0.22s, box-shadow 0.22s;
    }
    .input-wrap:focus-within {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(184,169,245,0.13);
    }
    .input-wrap svg {
      flex-shrink: 0;
      opacity: 0.45;
      width: 16px; height: 16px;
    }
    .input-wrap input, .input-wrap select {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--white);
      font-family: var(--font-body);
      font-size: 0.875rem;
      padding: 11px 0;
    }
    .input-wrap input::placeholder { color: var(--placeholder); }
    
    .input-wrap select {
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .input-wrap select option {
      background: #1a1815;
      color: var(--white);
    }

    .input-wrap input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.5;
      cursor: pointer;
    }

    /* ─── PRIMARY ACTION BUTTON ─── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 24px;
      background: var(--btn-gradient);
      border: none;
      border-radius: var(--radius-btn);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.18s;
      box-shadow: 0 4px 18px rgba(139,119,232,0.35);
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); opacity: 1; }

    /* ─── SWITCH LINK ─── */
    .switch-text {
      text-align: center;
      margin-top: 18px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .switch-text a {
      color: var(--lavender);
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }
    .switch-text a:hover { color: #d3c9fa; text-decoration: underline; }

    /* ─── STAR PARTICLES ─── */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; }
      50%      { opacity: var(--peak, 0.7); }
    }

    /* ─── GLASSMORPHISM POPUP MODAL ─── */
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0);
      backdrop-filter: blur(0);
      -webkit-backdrop-filter: blur(0);
      transition: background 0.32s ease, backdrop-filter 0.32s ease;
    }
    .popup-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .popup-modal {
      background: rgba(26, 24, 21, 0.65);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(184, 169, 245, 0.25);
      border-radius: 16px;
      padding: 32px 28px;
      width: 90%;
      max-width: 360px;
      box-shadow:
        0 12px 56px rgba(0, 0, 0, 0.48),
        0 1px 0 rgba(255, 255, 255, 0.08) inset,
        0 0 0 1px rgba(184, 169, 245, 0.15) inset;
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .popup-overlay.active .popup-modal {
      opacity: 1;
      transform: scale(1);
    }

    .popup-modal.closing {
      opacity: 0;
      transform: scale(0.85);
    }

    .popup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .popup-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--lavender);
      letter-spacing: 0.02em;
    }

    .popup-close {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .popup-close:hover {
      color: var(--lavender);
      background: rgba(184, 169, 245, 0.1);
    }

    .popup-message {
      font-size: 0.95rem;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 480px) {
      header { padding: 18px 20px; }
      .glass-panel { padding: 28px 20px 24px; }
      .popup-modal { padding: 24px 20px; max-width: 85%; }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <header>
    <a href="index.html" class="brand">
      <span class="lens">Trend</span><span class="trend">Lens</span>
    </a>

    <div class="tab-bar" id="tabBar">
      <div class="tab-pill" id="tabPill"></div>
      <button id="btnLogin" onclick="switchTo('login')">Login</button>
      <button id="btnSignup" onclick="switchTo('signup')" class="active">Sign Up</button>
    </div>
  </header>

  <main>
    <div class="glass-panel">
      <div class="forms-wrapper">

        <div class="form-view active" id="viewSignup">
          <div class="avatar-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="#b8a9f5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>

          <div class="field">
            <label for="su-name">Name</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input id="su-name" type="text" placeholder="Enter your full name" />
            </div>
          </div>

          <div class="field">
            <label for="su-dob">Date of Birth</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <input id="su-dob" type="date" />
            </div>
          </div>

          <div class="field">
            <label for="su-gender">Gender</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                <path d="M2 12h20"/>
              </svg>
              <select id="su-gender">
                <option value="" disabled selected>Select your gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Non-binary">Non-binary</option>
                <option value="Prefer not to say">Prefer not to say</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="su-email">Email ID</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m2 7 10 7 10-7"/>
              </svg>
              <input id="su-email" type="email" placeholder="Enter your email address" autocomplete="email"/>
            </div>
          </div>

          <div class="field">
            <label for="su-business">Business</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
              </svg>
              <input id="su-business" type="text" placeholder="Company or niche area" />
            </div>
          </div>

          <div class="field">
            <label for="su-location">Location</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              <input id="su-location" type="text" placeholder="City, Country" />
            </div>
          </div>

          <div class="field">
            <label for="su-username">Username</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>
              </svg>
              <input id="su-username" type="text" placeholder="Create unique username" autocomplete="username"/>
            </div>
          </div>

          <div class="field">
            <label for="su-password">Password</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input id="su-password" type="password" placeholder="Create strong password" autocomplete="new-password"/>
            </div>
          </div>

          <button class="btn-primary" onclick="validateSignup()">Sign Up</button>

          <p class="switch-text">
            Already have an account? <a onclick="switchTo('login')">Log in</a>
          </p>
        </div>

        <div class="form-view" id="viewLogin">
          <div class="avatar-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="#b8a9f5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>

          <div class="field">
            <label for="li-username">Username</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input id="li-username" type="text" placeholder="Enter your username" autocomplete="username"/>
            </div>
          </div>

          <div class="field">
            <label for="li-password">Password</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input id="li-password" type="password" placeholder="Enter your password" autocomplete="current-password"/>
            </div>
          </div>

          <button class="btn-primary" onclick="validateLogin()">Login</button>

          <p class="switch-text">
            Not registered yet? <a onclick="switchTo('signup')">Sign up</a>
          </p>
        </div>

      </div>
    </div>
  </main>

  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-modal" id="popupModal">
      <div class="popup-header">
        <h2 class="popup-title" id="popupTitle">Alert</h2>
        <button class="popup-close" id="popupClose" onclick="closePopup()">&times;</button>
      </div>
      <p class="popup-message" id="popupMessage">Message goes here.</p>
    </div>
  </div>

  <script>
    /* ─── STAR PARTICLE GENERATOR ─── */
    (function() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 55; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.2 + 0.6;
        s.style.cssText = `
          width:${size}px; height:${size}px;
          left:${Math.random()*100}%;
          top:${Math.random()*100}%;
          --dur:${(Math.random()*4+2).toFixed(1)}s;
          --peak:${(Math.random()*0.6+0.2).toFixed(2)};
          animation-delay:${(Math.random()*5).toFixed(1)}s;
        `;
        container.appendChild(s);
      }
    })();

    /* ─── TAB PILL POSITIONING ─── */
    const tabBar   = document.getElementById('tabBar');
    const pill     = document.getElementById('tabPill');
    const btnLogin  = document.getElementById('btnLogin');
    const btnSignup = document.getElementById('btnSignup');

    function positionPill(btn) {
      const barRect = tabBar.getBoundingClientRect();
      const btnRect = btn.getBoundingClientRect();
      pill.style.left  = (btnRect.left - barRect.left) + 'px';
      pill.style.width = btnRect.width + 'px';
    }

    /* ─── STATE SWITCH ─── */
    let currentState = 'signup';

    function switchTo(state) {
      if (state === currentState) return;
      currentState = state;

      const viewSignup = document.getElementById('viewSignup');
      const viewLogin  = document.getElementById('viewLogin');

      if (state === 'login') {
        viewSignup.classList.remove('active');
        viewLogin.classList.add('active');
        btnLogin.classList.add('active');
        btnSignup.classList.remove('active');
        positionPill(btnLogin);
      } else {
        viewLogin.classList.remove('active');
        viewSignup.classList.add('active');
        btnSignup.classList.add('active');
        btnLogin.classList.remove('active');
        positionPill(btnSignup);
      }
    }

    /* ─── POPUP FUNCTIONS ─── */
    const popupOverlay = document.getElementById('popupOverlay');
    const popupModal = document.getElementById('popupModal');
    const popupTitle = document.getElementById('popupTitle');
    const popupMessage = document.getElementById('popupMessage');

    function showPopup(title, message) {
      popupTitle.textContent = title;
      popupMessage.textContent = message;
      popupOverlay.classList.add('active');
      popupModal.classList.remove('closing');
      document.body.style.overflow = 'hidden';
    }

    function closePopup() {
      popupModal.classList.add('closing');
      setTimeout(() => {
        popupOverlay.classList.remove('active');
        document.body.style.overflow = 'auto';
      }, 320);
    }

    popupOverlay.addEventListener('click', (e) => {
      if (e.target === popupOverlay) {
        closePopup();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && popupOverlay.classList.contains('active')) {
        closePopup();
      }
    });

    /* ─── VALIDATION & STORAGE FUNCTIONS ─── */
    function isValidEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    function isValidPassword(password) {
      return password.length >= 8;
    }

    function validateSignup() {
      const name = document.getElementById('su-name').value.trim();
      const dob = document.getElementById('su-dob').value;
      const gender = document.getElementById('su-gender').value;
      const email = document.getElementById('su-email').value.trim();
      const business = document.getElementById('su-business').value.trim();
      const location = document.getElementById('su-location').value.trim();
      const username = document.getElementById('su-username').value.trim();
      const password = document.getElementById('su-password').value;

      if (!name || !dob || !gender || !email || !business || !location || !username || !password) {
        showPopup('Insufficient Details', 'Please fill in all required operational workspace profile setup fields before continuing.');
        return;
      }

      if (!isValidEmail(email)) {
        showPopup('Invalid Email', 'Please enter a valid global system email address.');
        return;
      }

      if (!isValidPassword(password)) {
        showPopup('Weak Password', 'Your authentication password must contain at least 8 characters.');
        return;
      }

      // Save credentials to localized memory frame safely
      localStorage.setItem('saved_name', name);
      localStorage.setItem('saved_dob', dob);
      localStorage.setItem('saved_gender', gender);
      localStorage.setItem('saved_email', email);
      localStorage.setItem('saved_business', business);
      localStorage.setItem('saved_location', location);
      localStorage.setItem('saved_username', username);
      localStorage.setItem('saved_password', password); // Explicit database password bind

      window.location.href = 'main.html';
    }

    function validateLogin() {
      const usernameInput = document.getElementById('li-username').value.trim();
      const passwordInput = document.getElementById('li-password').value;

      if (!usernameInput || !passwordInput) {
        showPopup('Insufficient Details', 'Please fill in all required fields before continuing.');
        return;
      }

      // Strict matching against stored browser dataset
      const storedUsername = localStorage.getItem('saved_username');
      const storedPassword = localStorage.getItem('saved_password');

      // 1. Check if username profile mapping exists inside local storage sandbox
      if (usernameInput !== storedUsername) {
        showPopup('Incorrect Username', 'The username signature map entered does not exist or matches nothing in our records.');
        return;
      }

      // 2. Map evaluation map checks against the existing profile user instance's assigned password string matrix
      if (passwordInput !== storedPassword) {
        showPopup('Incorrect Password', 'The credentials verification security sequence string does not align with your registered data profile.');
        return;
      }

      // Success conditional state entry gate pass
      window.location.href = 'main.html';
    }

    /* ─── INIT PILL POSITION after layout & HANDLE INCOMING VIEW ─── */
    window.addEventListener('load', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const requestedView = urlParams.get('view');

      if (requestedView === 'login') {
        switchTo('login');
      } else {
        positionPill(btnSignup);
      }
    });

    window.addEventListener('resize', () => {
      positionPill(currentState === 'login' ? btnLogin : btnSignup);
    });
  </script>
</body>
</html>
